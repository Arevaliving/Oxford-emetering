const isOccupied = u => (u.dh[4]+u.dc[4])>0.15 || (u.dh[5]+u.dc[5])>0.15;
function getStatus(u) {
  const active = isOccupied(u);
  const allVals = [...u.dh,...u.dc].filter(v=>v>0);
  if (!allVals.length) return "vacant";
  const avg = allVals.reduce((a,b)=>a+b,0)/allVals.length;
  const maxRecent = Math.max(u.dh[4],u.dc[4],u.dh[5],u.dc[5]);
  if (maxRecent>avg*4&&maxRecent>8) return "anomaly";
  return active ? "active" : "vacant";
}

const Spark = ({vals,color}) => {
  const max = Math.max(...vals,0.01);

    <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round"/>
    {vals.map((v,i)=>{ if(i!==vals.length-1) return null;
      const x=pad+(i/(vals.length-1))*(w-2*pad),y=h-pad-(v/max)*(h-2*pad);
      return <circle key={i} cx={x} cy={y} r={2.5} fill={color}/>;
    })}
  </svg>;
};

                  {sel.snap_dates&&sel.dh_cum&&(
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:9,color:"#1e4570",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Cumulative YTD (from Jan 1)</div>
                    <ResponsiveContainer width="100%" height={75}>
                      <LineChart data={sel.snap_dates.slice(4).map((d,i)=>({d:d.slice(5),dhw:+(sel.dh_cum[i+4]-(sel.dh_cum[4]||0)).toFixed(3),dcw:+(sel.dc_cum[i+4]-(sel.dc_cum[4]||0)).toFixed(3)}))}>
                        <CartesianGrid strokeDasharray="2 4" stroke="#0f2040" vertical={false}/>
                        <XAxis dataKey="d" tick={{fontSize:7,fill:"#3d6494"}} axisLine={false} tickLine={false}/>
                        <YAxis tick={{fontSize:8,fill:"#3d6494"}} axisLine={false} tickLine={false} width={28}/>
                        <Tooltip {...TT} contentStyle={{...TT.contentStyle,fontSize:10}}/>
                        <Line type="monotone" dataKey="dhw" stroke="#f97316" strokeWidth={1.5} dot={{r:2,fill:"#f97316"}} name="DHW YTD"/>
                        <Line type="monotone" dataKey="dcw" stroke="#7aa8c7" strokeWidth={1.5} dot={{r:2,fill:"#7aa8c7"}} name="DCW YTD"/>
                      </LineChart>
                    </ResponsiveContainer>
                  </div>)}
                  {sel.daily&&Object.keys(sel.daily).length>0&&(()=>{
                    const dailyEntries=Object.entries(sel.daily).sort((a,b)=>a[0]<b[0]?-1:1);
                    const dailyChartData=dailyEntries.map(([d,v])=>({d:d.slice(5),full:d,dhw:v.dh||0,dcw:v.dc||0,total:+((v.dh||0)+(v.dc||0)).toFixed(4)}));
                    const firstDate=dailyEntries[0][0];
                    const lastDate=dailyEntries[dailyEntries.length-1][0];
                    const avgDhw=dailyChartData.reduce((s,r)=>s+r.dhw,0)/dailyChartData.length;
                    const avgDcw=dailyChartData.reduce((s,r)=>s+r.dcw,0)/dailyChartData.length;
                    const peakRow=dailyChartData.reduce((a,r)=>r.total>a.total?r:a,dailyChartData[0]);
                    // resolve selected day index
                    const selDayIdx = selDay ? dailyChartData.findIndex(r=>r.full===selDay) : -1;
                    const activeDayIdx = selDayIdx>=0 ? selDayIdx : dailyChartData.length-1;
                    const activeDay = dailyChartData[activeDayIdx];
                    const dhwRate=cfg?.dhwRate||5.25; const dcwRate=cfg?.dcwRate||1.87;
                    return(
                    <div style={{marginTop:12}}>
                      <div style={{fontSize:9,color:"#1e4570",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span>Daily Consumption · {firstDate.slice(5)} → {lastDate.slice(5)}</span>
                        <span style={{color:"#0f2a50",fontSize:8}}>{dailyEntries.length} days</span>
                      </div>
                      {/* Bar chart — click bar to select day */}
                      <ResponsiveContainer width="100%" height={90}>
                        <BarChart data={dailyChartData} barCategoryGap="15%" barGap={1}
                          onClick={e=>e&&e.activePayload&&setSelDay(e.activePayload[0]?.payload?.full)}
                          style={{cursor:"pointer"}}>
                          <CartesianGrid strokeDasharray="2 4" stroke="#0f2040" vertical={false}/>
                          <XAxis dataKey="d" tick={{fontSize:6,fill:"#3d6494"}} axisLine={false} tickLine={false} interval={1}/>
                          <YAxis tick={{fontSize:7,fill:"#3d6494"}} axisLine={false} tickLine={false} width={24}/>
                          <Tooltip {...TT} contentStyle={{...TT.contentStyle,fontSize:9}} formatter={(v,n)=>[v.toFixed(4)+' m³',n==='dhw'?'DHW':'DCW']}/>
                          <Bar dataKey="dhw" stackId="a" name="dhw" radius={[0,0,0,0]}
                            fill="#f97316"
                            isAnimationActive={false}>
                            {dailyChartData.map((entry,idx)=>(
                              <Cell key={idx} fill={idx===activeDayIdx?"#fb923c":"#f97316"} opacity={idx===activeDayIdx?1:0.6}/>
                            ))}
                          </Bar>
                          <Bar dataKey="dcw" stackId="a" name="dcw" radius={[2,2,0,0]}
                            fill="#7aa8c7"
                            isAnimationActive={false}>
                            {dailyChartData.map((entry,idx)=>(
                              <Cell key={idx} fill={idx===activeDayIdx?"#93c5fd":"#7aa8c7"} opacity={idx===activeDayIdx?1:0.6}/>
                            ))}
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>
                      {/* Day navigator */}
                      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,background:"#06101e",borderRadius:8,padding:"8px 10px",border:"1px solid #0f2040"}}>
                        <button onClick={()=>setSelDay(dailyChartData[Math.max(0,activeDayIdx-1)].full)}
                          disabled={activeDayIdx===0}
                          style={{background:"none",border:"1px solid #1e4570",borderRadius:4,color:activeDayIdx===0?"#1e3050":"#7aa8c7",cursor:activeDayIdx===0?"default":"pointer",padding:"2px 7px",fontSize:13,lineHeight:1}}>â¹</button>
                        <div style={{flex:1,textAlign:"center"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#93c5fd"}}>{activeDay.full}</div>
                          <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:4,fontSize:10}}>
                            <span style={{color:"#fdba74"}}>DHW <b>{activeDay.dhw.toFixed(4)}</b> m³</span>
                            <span style={{color:"#bdd8ea"}}>DCW <b>{activeDay.dcw.toFixed(4)}</b> m³</span>
                            <span style={{color:"#c4b5fd"}}>Cost <b>${((activeDay.dhw*dhwRate)+(activeDay.dcw*dcwRate)).toFixed(2)}</b></span>
                          </div>
                          <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:3,fontSize:9,color:"#1e4570"}}>
                            <span>vs avg: <span style={{color:activeDay.dhw>avgDhw*1.5?"#f87171":"#6ee7b7"}}>{activeDay.dhw>avgDhw?"+":""}{((activeDay.dhw-avgDhw)/Math.max(avgDhw,0.001)*100).toFixed(0)}% DHW</span></span>
                            <span><span style={{color:activeDay.dcw>avgDcw*1.5?"#f87171":"#6ee7b7"}}>{activeDay.dcw>avgDcw?"+":""}{((activeDay.dcw-avgDcw)/Math.max(avgDcw,0.001)*100).toFixed(0)}% DCW</span></span>
                          </div>
                        </div>
                        <button onClick={()=>setSelDay(dailyChartData[Math.min(dailyChartData.length-1,activeDayIdx+1)].full)}
                          disabled={activeDayIdx===dailyChartData.length-1}
                          style={{background:"none",border:"1px solid #1e4570",borderRadius:4,color:activeDayIdx===dailyChartData.length-1?"#1e3050":"#7aa8c7",cursor:activeDayIdx===dailyChartData.length-1?"default":"pointer",padding:"2px 7px",fontSize:13,lineHeight:1}}>âº</button>
                      </div>
                      {/* Summary stats */}
                      <div style={{display:"flex",gap:12,marginTop:6,fontSize:9,color:"#1e4570"}}>
                        <span>Avg: <span style={{color:"#f97316"}}>{avgDhw.toFixed(3)}</span>+<span style={{color:"#7aa8c7"}}>{avgDcw.toFixed(3)}</span> m³/day</span>
                        <span style={{marginLeft:"auto"}}>Peak: <span style={{color:"#c4b5fd"}}>{peakRow.total.toFixed(3)} m³</span> on {peakRow.d}</span>
                      </div>
                    </div>
                  );})()}
                  <div style={{marginTop:14,background:"#060c18",borderRadius:8,padding:"12px 14px",border:"1px solid #0f2040"}}>
                    <div style={{fontSize:9,color:"#1e4570",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Cost · {MONTHS[monthIdx]}</div>
                    {[{label:"DHW",val:enriched.find(u=>u.u===sel.u)?.dhw||0,rate:cfg.dhwRate,color:"#fdba74"},
                      {label:"DCW",val:enriched.find(u=>u.u===sel.u)?.dcw||0,rate:cfg.dcwRate,color:"#bdd8ea"}].map(r=>(
                      <div key={r.label} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:r.color,marginBottom:4}}>
                        <span>{r.label} {fv(r.val)} m³ × ${r.rate}</span>
                        <span style={{fontWeight:700}}>${(r.val*r.rate).toFixed(2)}</span>
                      </div>
                    ))}
                    <div style={{borderTop:"1px solid #0f2040",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,color:"#c4b5fd"}}>
                      <span>Total</span>
                      <span>{fc(enriched.find(u=>u.u===sel.u)?.dhw||0,enriched.find(u=>u.u===sel.u)?.dcw||0,cfg)}</span>
                    </div>
                  </div>
                  {enriched.find(u=>u.u===sel.u)?.status==="vacant"&&(
                    <div style={{marginTop:12,background:"#030b1c",border:"1px solid #1e3a8a40",borderRadius:8,padding:"10px 12px",fontSize:11,color:"#93c5fd",lineHeight:1.5}}>
                      📋 Vacant unit — low or zero consumption detected.
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="alerts" && (
          <div style={{maxWidth:760}}>
            {Object.keys(KNOWN_ANOMALIES).length>0&&(
              <div style={{marginBottom:24}}>
                <div style={{fontSize:10,color:"#92400e",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12,fontWeight:700}}>⚠ Consumption Anomalies · Detected in Historical Data</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {Object.entries(KNOWN_ANOMALIES).map(([unit,note])=>{
                    const u=enriched.find(x=>x.u===unit);
                    return (
                      <div key={unit} style={{background:"#110800",border:"1px solid #92400e40",borderRadius:10,padding:"16px 18px",display:"flex",alignItems:"flex-start",gap:14}}>
                        <span style={{fontSize:22,flexShrink:0}}>💧</span>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                            <span style={{fontSize:15,fontWeight:700,color:"#fcd34d"}}>Unit {unit}</span>
                            <span style={{fontSize:10,color:"#92400e"}}>Level {u?.f}</span>
                          </div>
                          <div style={{fontSize:12,color:"#d97706",lineHeight:1.6}}>{note}</div>
                          <div style={{marginTop:8,display:"flex",gap:16,fontSize:11}}>
                            <span style={{color:"#fdba74"}}>DHW Jan: {fv(u?.dh[4])} m³</span>
                            <span style={{color:"#bdd8ea"}}>DCW Jan: {fv(u?.dc[4])} m³</span>
                          </div>
                        </div>
                        <button style={{...S.btn,fontSize:11,padding:"6px 12px",flexShrink:0}}
                          onClick={()=>{setTab("units");setSelUnit(unit);setMonthIdx(4);}}>View →</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {(()=>{
              const vact=enriched.filter(u=>u.status==="vacant"&&(u.dh[5]+u.dc[5])>0.05);
              if(!vact.length) return null;
              return (
                <div>
                  <div style={{fontSize:10,color:"#1e3a8a",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12,fontWeight:700}}>ð  Vacant Units with Activity in Feb/Mar</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {vact.map(u=>(
                      <div key={u.u} style={{background:"#030b1c",border:"1px solid #1e3a8a40",borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}>
                        <div style={{flex:1}}>
                          <span style={{fontWeight:700,color:"#93c5fd"}}>Unit {u.u}</span>
                          <span style={{fontSize:10,color:"#1e3a8a",marginLeft:8}}>Level {u.f} · Vacant</span>
                          <div style={{fontSize:11,color:"#3d6494",marginTop:4}}>Feb/Mar DHW {fv(u.dh[5])} m³ · DCW {fv(u.dc[5])} m³</div>
                        </div>
                        <button style={{...S.btn,fontSize:11,padding:"6px 12px"}}
                          onClick={()=>{setTab("units");setSelUnit(u.u);setMonthIdx(5);}}>View →</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {tab==="settings" && (
          <div style={{maxWidth:540,display:"flex",flexDirection:"column",gap:20}}>
            <div style={S.card}>
              <div style={{fontSize:11,fontWeight:700,color:"#7aa8c7",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:16}}>Water Rates</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[{label:"DHW Rate ($/m³)",key:"dhwRate"},{label:"DCW Rate ($/m³)",key:"dcwRate"}].map(({label,key})=>(
                  <div key={key}>
                    <div style={{fontSize:10,color:"#1e4570",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
                    <input type="number" step="0.01" defaultValue={cfg[key]} onChange={e=>cfgDraft.current[key]=parseFloat(e.target.value)||0} style={{...S.input,width:"100%"}}/>
                  </div>
                ))}
              </div>
            </div>
            <div style={S.card}>
              <div style={{fontSize:11,fontWeight:700,color:"#7aa8c7",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:16}}>Anomaly Detection</div>
              <div style={{fontSize:10,color:"#1e4570",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Threshold (× rolling average)</div>
              <input type="number" step="0.5" defaultValue={cfg.anomalyMult} onChange={e=>cfgDraft.current.anomalyMult=parseFloat(e.target.value)||3} style={{...S.input,width:"100%"}}/>
            </div>
            <div style={S.card}>
              <div style={{fontSize:11,fontWeight:700,color:"#7aa8c7",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:16}}>Building</div>
              <div style={{fontSize:10,color:"#1e4570",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Building Name</div>
              <input type="text" defaultValue={cfg.buildingName} onChange={e=>cfgDraft.current.buildingName=e.target.value} style={{...S.input,width:"100%"}}/>
            </div>
            <button style={{...S.btn,background:"#0a3a6e",borderRadius:8}} onClick={()=>setCfg({...cfg,...cfgDraft.current})}>Apply Settings</button>
            <div style={S.card}>
              <div style={{fontSize:11,fontWeight:700,color:"#7aa8c7",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:14}}>System Info</div>
              {[["Gateways","0016044252 (East · 77 units) · 0016046347 (West · 63 units)"],
                ["Coverage","140 of 140 suites · 280 of 280 meters reporting"],
                ["Rates","DHW $5.25/m³ · DCW $1.87/m³ · FortisBC 2026 + DNV Bylaw 2279 (Dec 2025)"],
                ["Data","Elvaco CMe3100 · Maddalena SJ EVO · M-Bus"],
                ["Refresh","Daily · 02:00–02:16 · SFTP pull"],
                ["Hosting","DigitalOcean Droplet · Nginx · HTTP Basic Auth"],
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",gap:12,marginBottom:10,fontSize:11}}>
                  <span style={{color:"#7aa8c7",fontWeight:700,minWidth:90,flexShrink:0}}>{k}</span>
                  <span style={{color:"#3d6494",lineHeight:1.5}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.render(<Dashboard />, document.getElementById("root"));
  </script>
</body>
</html>
