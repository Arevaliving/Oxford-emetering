# Oxford Suites Dashboard — Nginx configuration
# ================================================
# Place in: /etc/nginx/sites-available/oxford
# Enable:   ln -s /etc/nginx/sites-available/oxford /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;           # ← replace with actual domain or droplet IP

    # Redirect HTTP → HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    root /home/oxford/oxford-sync/www;
    index index.html;

    # ── HTTP Basic Auth ──────────────────────────────────────────
    # Create htpasswd:  htpasswd -c /etc/nginx/.htpasswd areva
    auth_basic           "Oxford Suites · Water Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Static React app ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Data API ─────────────────────────────────────────────────
    # latest.json is written by sync.py — serve with short cache
    location /data/latest.json {
        add_header Content-Type  "application/json";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma        "no-cache";

        # Allow dashboard to fetch from any origin (same-origin in practice)
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # ── Archive CSVs (admin only, restrict to your IP) ───────────
    location /archive/ {
        # Uncomment and set your office IP to allow browsing raw CSVs
        # allow 1.2.3.4;
        # deny  all;
        autoindex on;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/oxford_access.log;
    error_log  /var/log/nginx/oxford_error.log;
}
